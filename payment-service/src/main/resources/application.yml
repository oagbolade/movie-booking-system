server:
  port: 8080

spring:
  application:
    name: payment-service

  data:
    mongodb:
      uri: mongodb://mongodb:27017/paymentdb

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Mongock
mongock:
  migration-scan-package:
    - com.platform.payment.migration

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

# Custom Config
payment:
  provider: stripe

kafka:
  topics:
    notification: notification.requested

logging:
  level:
    root: INFO

resilience4j:
  ratelimiter:
    instances:
      paymentLimiter:
        limit-for-period: 5
        limit-refresh-period: 1m
        timeout-duration: 0
  circuitbreaker:
    instances:
      paymentProviderCircuitBreaker:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      paymentNotificationCircuitBreaker:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      paymentProviderRetry:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.lang.RuntimeException
      paymentNotificationRetry:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.lang.RuntimeException
